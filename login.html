<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
    <!-- Tên: Nguyễn Khánh Trung
Lớp: 24TTH002
MSSV: 24T01010 -->
</head>
<body>
    <button id="backhome"> Về trang chính </button>
    <div> </div>
    <div class="container">
        <h1 id="welcometext">THÔNG TIN ĐĂNG NHẬP</h1>
        <div class="buttons" id="authbuttons">
        <button id="btnlogin">Đăng nhập</button>
        <button id="btnregister">Đăng ký</button>
        </div>
        <button id="btnlogout">Đăng xuất</button>
        <!-- form dang nhap -->
         <div class="form" id="loginform">
            <h2>Đăng nhập</h2>
            <input type="text" id="loginuser" placeholder="Tên đăng nhập">
            <input type="password" id="loginpass" placeholder="Mật khẩu">
            <button id="loginsubmit">Đăng nhập</button>
            <p>Bạn chưa có tài khoản?
                <span onclick="showregister()">Đăng ký</span>
            </p>
         </div>
         <!-- from đăng ký -->
          <div class="form" id="registerform">
            <h2>Đăng ký</h2>
            <input type="text" id="registeruser" placeholder="Tên đăng nhập">
            <input type="password" id="registerpass" placeholder="Mật khẩu">
            <button id="registersubmit">Đăng ký</button>
            <p>Đã có tài khoản?
                <span onclick="showlogin()">Đăng nhập</span>
            </p>
          </div>
    </div>
    <div id="footer-container"></div>

    <script>
        fetch("footer.html")
        .then(dulieu =>dulieu.text())
        .then(thongtin => { document.getElementById("footer-container").innerHTML=thongtin })
    </script>
    <script src="js/login.js"></script>
</body>
</html>
